<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Princess Period Check-In</title>
<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#ffe6f2;
    color:#444;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input[type=range]{
    width:80%;
}

button{
    background:#ff80bf;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

#pongSection{
    display:none;
}

canvas{
    background:white;
    border:3px solid #ff80bf;
    border-radius:15px;
}

#result{
    font-size:24px;
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

    <h1>🌸 Princess Period Check-In 🌸</h1>

    <div class="card">
        <h3>🌷 Cramp Level</h3>
        <input type="range" id="cramps" min="0" max="10" value="5">

        <h3>✨ Energy Level</h3>
        <input type="range" id="energy" min="0" max="10" value="5">

        <h3>💕 Comfort Need</h3>
        <input type="range" id="comfort" min="0" max="10" value="5">

        <h3>🌙 Mood Level</h3>
        <input type="range" id="mood" min="0" max="10" value="5">

        <h3>🧸 Social Battery</h3>
        <input type="range" id="social" min="0" max="10" value="5">

        <br><br>

        <button onclick="calculate()">Get Flower Status 🌸</button>

        <div id="result"></div>
    </div>
    
<div id="pongSection" class="card">
    <h2>❤️ Catch the Hearts ❤️</h2>
    <p>Catch 10 hearts in 20 seconds!</p>

    <canvas id="game" width="350" height="500"></canvas>

    <div id="scoreDisplay">Hearts: 0 ❤️</div>
    <div id="pongResult"></div>
</div>
   

</div>

<script>

    const today = new Date().toDateString();
const lastVisit = localStorage.getItem("princessCheckInDate");

if (lastVisit === today) {

    document.body.innerHTML = `
        <div style="
            max-width:600px;
            margin:50px auto;
            padding:30px;
            background:white;
            border-radius:20px;
            text-align:center;
            font-family:Arial;
        ">
            <h1>🌸 Daily Check-In Complete 🌸</h1>

            <p>You already completed today's Princess Check-In.</p>

            <h2>💖 Love Level: 100%</h2>

            <p>Come back tomorrow for a new flower status and reward!</p>

            <p>👑 Total Princess Points:
                ${localStorage.getItem("princessPoints") || 0}
            </p>
        </div>
    `;
}
function calculate(){

    let cramps = +document.getElementById("cramps").value;
    let energy = +document.getElementById("energy").value;
    let comfort = +document.getElementById("comfort").value;
    let mood = +document.getElementById("mood").value;
    let social = +document.getElementById("social").value;

    let score =
        (cramps * 0.4) +
        ((10-energy) * 0.2) +
        (comfort * 0.15) +
        (mood * 0.15) +
        ((10-social) * 0.1);

    let text="";

    if(score < 2)
        text="🌸 Blooming Day";
    else if(score < 4)
        text="🌷 Soft Petal Day";
    else if(score < 6)
        text="🪻 Cozy Lavender Day";
    else if(score < 8)
        text="🥀 Recovery Rose Day";
    else
        text="👑 Hibernate Queen Day";

    document.getElementById("result").innerHTML =
        "<br><b>"+text+"</b>";

    document.getElementById("pongSection").style.display="block";
}
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let basketX = 140;
let score = 0;
let timeLeft = 20;

const basketWidth = 80;
const basketHeight = 20;

let hearts = [];

function spawnHeart() {
    hearts.push({
        x: Math.random() * (canvas.width - 30),
        y: -30,
        speed: 2 + Math.random() * 3
    });
}

canvas.addEventListener("touchmove", (e) => {
    const rect = canvas.getBoundingClientRect();
    basketX = e.touches[0].clientX - rect.left - basketWidth / 2;
});

canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    basketX = e.clientX - rect.left - basketWidth / 2;
});

function drawBasket() {
    ctx.font = "50px Arial";
    ctx.fillText(
        "🧺",
        basketX,
        canvas.height - 15
    );
}

function drawHeart(x, y) {
    ctx.font = "28px Arial";
    ctx.fillText("❤️", x, y);
}

function gameLoop() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBasket();

    for (let i = hearts.length - 1; i >= 0; i--) {

        let h = hearts[i];

        h.y += h.speed;

        drawHeart(h.x, h.y);

        if (
            h.y > canvas.height - 50 &&
           h.x > basketX &&
h.x < basketX + 50
        ) {
            score++;
            document.getElementById("scoreDisplay").innerHTML =
                `Hearts: ${score} ❤️`;

            hearts.splice(i, 1);
            continue;
        }

        if (h.y > canvas.height + 20) {
            hearts.splice(i, 1);
        }
    }

    requestAnimationFrame(gameLoop);
}

setInterval(spawnHeart, 700);

const timer = setInterval(() => {

    timeLeft--;

    if (timeLeft <= 0) {

        clearInterval(timer);

        hearts = [];

        const result =
            document.getElementById("pongResult");

        if (score >= 10) {

            result.innerHTML = `
                <h2>👑 Victory!</h2>
                <p>You earned 100 Princess Points.</p>
                <p>🌸 Heart Catching Queen 🌸</p>
            `;

        } else {

            result.innerHTML = `
                <h2>🍫 Reward Unlocked</h2>
                <p>Your boyfriend owes you a snack.</p>
                <p>💕 Better luck next time!</p>
            `;
        }
    }

}, 1000);

gameLoop();

</script>

</body>
</html>
